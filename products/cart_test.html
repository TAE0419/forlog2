<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR-LOG - CART</title>
    
    <!-- jQuery (다른 외부 스크립트에서 참조할 수 있으므로 유지) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 폭죽 파티클 효과를 위한 canvas-confetti 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="../common/FontAndColor/FontAndColor.css">

    <style>
        /* FOR-LOG 프로젝트 전용 테마 컬러 정의 */
        :root {
            --main-color: #AAB664;
            --sub-color: #6F8B41;
            --bg-color: #FFFEF3;
            --point-color: #DB824A;
            --dark-color: #24331C;
            --line-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            list-style: none;
            text-decoration: none;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }

        a {
            color: inherit;
        }

        /* -----------------------------------------
           [전체 레이아웃 및 본문 스타일 (Body/Main)]
        -------------------------------------------- */
        body {
            background-color: var(--bg-color) !important;
            color: var(--dark-color);
            overflow-x: hidden;
            /* 푸터 하단 밀착을 위한 플렉스 박스 설정 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 동적으로 불러올 푸터 래퍼를 맨 아래로 밀어내기 */
        #footer {
            margin-top: auto;
            width: 100%;
        }

        .cart-page {
            padding: clamp(120px, 12vh, 180px) 0 100px;
            min-height: auto; 
        }

        .cart-inner {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
        }

        .cart-header {
            text-align: left;
            margin-bottom: clamp(30px, 5vh, 50px);
            display: flex;
            align-items: flex-end;
            gap: 15px;
            flex-wrap: wrap;
        }

        .cart-header h2 {
            color: var(--main-color);
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
            font-family: var(--font-cloud);
            font-size: clamp(3.5rem, 8vw, 8rem);
            line-height: 0.8;
        }

        .cart-header .sub-title {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 800;
            color: var(--dark-color);
            margin-bottom: 5px;
        }

        .cart-content-wrapper {
            display: flex;
            gap: clamp(20px, 4vw, 40px);
            align-items: flex-start;
            margin-bottom: 50px;
        }

        @media (max-width: 1024px) {
            .cart-content-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .cart-table-area {
            flex: 1;
            width: 100%;
        }

        /* 데스크톱 테이블 구조 디자인 */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table th {
            color: var(--dark-color);
            padding: 14px 10px;
            font-size: 1.05rem;
            font-weight: 800;
            text-align: center;
            border-bottom: 2px dashed var(--main-color);
        }

        .cart-table th:nth-child(1) {
            text-align: left;
            width: 45%;
        }

        .cart-table th:nth-child(2) {
            width: 20%;
        }

        .cart-table th:nth-child(3) {
            width: 15%;
        }

        .cart-table th:nth-child(4) {
            width: 20%;
        }

        .cart-item-row {
            border-bottom: 1.5px dashed var(--main-color);
        }

        .cart-item-row td {
            padding: 25px 10px;
            vertical-align: middle;
            text-align: center;
        }

        .cart-item-info-cell {
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: #ffffff;
            border: 1px solid var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .cart-item-name {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            font-weight: 700;
            color: var(--dark-color);
            word-break: keep-all;
        }

        .quantity-control-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid var(--main-color);
            border-radius: 999px;
            padding: 4px 14px;
            background: #ffffff;
        }

        .qty-btn {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--sub-color);
            cursor: pointer;
        }

        .qty-text {
            font-weight: 700;
            font-size: 1rem;
            min-width: 24px;
            text-align: center;
        }

        .row-delete-btn {
            background: transparent;
            border: 1px solid var(--point-color);
            color: var(--point-color);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .row-delete-btn:hover {
            background-color: var(--point-color);
            color: #ffffff;
        }

        .empty-row td {
            padding: 80px 0;
            color: var(--sub-color);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--main-color);
        }

        /* 반응형 개선 */
        @media (max-width: 768px) {
            .cart-table thead {
                display: none;
            }

            .cart-table,
            .cart-table tbody,
            .cart-item-row,
            .cart-item-row td {
                display: block;
                width: 100%;
            }

            .cart-item-row {
                background-color: #ffffff;
                border: 1px solid var(--line-color);
                border-radius: 20px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            }

            .cart-item-row td {
                padding: 12px 0;
                border: none;
                text-align: right;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .cart-item-info-cell {
                justify-content: flex-start;
                padding-bottom: 15px;
                border-bottom: 1px dashed var(--line-color);
                margin-bottom: 5px;
                width: 100%;
            }

            .cart-item-img {
                width: 80px;
                height: 80px;
            }

            .cart-item-row td:nth-child(2)::before {
                content: "가격";
                color: var(--sub-color);
                font-weight: 700;
                font-size: 0.95rem;
            }

            .cart-item-row td:nth-child(3)::before {
                content: "수량";
                color: var(--sub-color);
                font-weight: 700;
                font-size: 0.95rem;
            }

            .cart-item-row td:nth-child(4)::before {
                content: "합계";
                color: var(--point-color);
                font-weight: 700;
                font-size: 0.95rem;
            }

            .row-delete-btn {
                margin-left: auto;
                padding: 6px 12px;
            }

            .empty-row td {
                display: block;
                text-align: center;
            }
        }

        /* 우측 가격 요약 사이드바 */
        .cart-summary-sidebar {
            width: 360px;
            background-color: var(--dark-color);
            border-radius: 36px;
            padding: 40px 30px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 30px;
            transition: all 0.3s;
        }

        @media (max-width: 1024px) {
            .cart-summary-sidebar {
                width: 100%;
            }
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .delivery-select-box {
            background-color: #ffffff;
            color: var(--dark-color);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        .summary-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 0;
        }

        .summary-total-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .summary-total-section .total-value {
            font-size: clamp(1.8rem, 4vw, 2.2rem);
            font-weight: 900;
            text-align: right;
        }

        .sidebar-order-btn {
            background-color: #ffffff;
            color: var(--dark-color);
            border: none;
            border-radius: 50px;
            width: 100%;
            height: 55px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-order-btn:hover {
            background-color: var(--bg-color);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* 하단 버튼 시스템 */
        .cart-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            border-top: 1.5px dashed var(--main-color);
            padding-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            max-width: 250px;
            min-width: 150px;
            min-height: 50px;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-secondary {
            background-color: var(--main-color);
            color: white;
        }

        .btn-secondary:hover {
            background-color: var(--sub-color);
        }

        .btn-danger {
            background-color: transparent;
            border: 2px solid var(--point-color);
            color: var(--point-color);
        }

        .btn-danger:hover {
            background-color: var(--point-color);
            color: white;
        }

        /* 일반 모달 */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-modal-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(33, 44, 27, 0.5);
            backdrop-filter: blur(2px);
        }

        .confirm-modal-content {
            position: relative;
            background: #fff;
            padding: 35px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .confirm-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-confirm-no,
        .btn-confirm-yes {
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-confirm-no {
            border: 1px solid var(--line-color);
            background: #fff;
        }

        .btn-confirm-yes {
            border: none;
            background: var(--point-color);
            color: #fff;
        }

        /* -----------------------------------------
           화려한 주문 완료 영수증 모달 
        -------------------------------------------- */
        .fancy-receipt-modal .confirm-modal-overlay {
            background: rgba(36, 51, 28, 0.7);
            backdrop-filter: blur(8px);
        }

        .fancy-receipt-content {
            position: relative;
            background: #ffffff;
            width: 90%;
            max-width: 480px;
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(170, 182, 100, 0.4), 0 0 80px rgba(219, 130, 74, 0.2);
            border: 4px solid var(--main-color);
            animation: modalPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(50px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .celebrate-icon {
            font-size: 4.5rem;
            color: var(--point-color);
            margin-bottom: 20px;
            display: inline-block;
            animation: bounceIcon 2s ease-in-out infinite;
        }

        @keyframes bounceIcon {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg) scale(1);
            }

            50% {
                transform: translateY(-15px) rotate(5deg) scale(1.1);
            }
        }

        .fancy-receipt-title {
            font-family: var(--font-cloud);
            font-size: 4rem;
            color: var(--main-color);
            margin-bottom: 5px;
            line-height: 1;
            text-shadow: 3px 3px 0px rgba(170, 182, 100, 0.2);
        }

        .fancy-receipt-subtitle {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--dark-color);
            margin-bottom: 30px;
        }

        /* 진짜 영수증처럼 보이게 하는 내부 박스 */
        .receipt-paper {
            background: var(--bg-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 35px;
            position: relative;
            border: 1px dashed var(--sub-color);
            text-align: left;
        }

        /* 영수증 펀칭 구멍 효과 */
        .receipt-paper::before,
        .receipt-paper::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .receipt-paper::before {
            left: -16px;
            border-right: 1px dashed var(--sub-color);
        }

        .receipt-paper::after {
            right: -16px;
            border-left: 1px dashed var(--sub-color);
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--dark-color);
        }

        .receipt-row.total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed var(--main-color);
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--point-color);
        }

        /* 고급스러운 빛 애니메이션 버튼  */
        .btn-finish-order {
            position: relative;
            background: linear-gradient(135deg, var(--point-color), #c96f38);
            color: #fff;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(219, 130, 74, 0.3);
            transition: all 0.3s;
            overflow: hidden;
        }

        /* 빛이 차르르 지나가는 가상 요소 */
        .btn-finish-order::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            animation: shimmerBtn 2.5s infinite;
        }

        .btn-finish-order:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(219, 130, 74, 0.5);
        }

        @keyframes shimmerBtn {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }
    </style>
</head>

<body>

    <!-- 팀 공통 헤더가 삽입될 위치 -->
    <div id="headers"></div>

    <main class="cart-page">
        <div class="cart-inner">
            <div class="cart-header">
                <h2>Cart</h2>
                <span class="sub-title">장바구니</span>
            </div>

            <div class="cart-content-wrapper">
                <div class="cart-table-area">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th>상품명</th>
                                <th>가격</th>
                                <th>수량</th>
                                <th>합계</th>
                            </tr>
                        </thead>
                        <tbody id="cart-table-body"></tbody>
                    </table>
                </div>

                <aside class="cart-summary-sidebar">
                    <div class="summary-row">
                        <span class="label-text">총 상품 가격</span>
                        <span id="sidebar-product-price" class="value-text">0원</span>
                    </div>
                    <div class="summary-row">
                        <select class="delivery-select-box" id="sidebar-delivery-select">
                            <option value="regular">일반 배송</option>
                            <option value="express">샛별 배송</option>
                        </select>
                        <span id="sidebar-shipping-fee" class="value-text">+ 3,000원</span>
                    </div>
                    <div class="summary-row">
                        <span class="label-text">할인</span>
                        <span id="sidebar-discount-price" class="value-text">-1,000원</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-total-section">
                        <div class="total-label">최종 결제 금액</div>
                        <div id="sidebar-final-price" class="total-value">0원</div>
                    </div>

                    <button type="button" class="sidebar-order-btn" onclick="executeOrder()">주문하기</button>
                </aside>
            </div>

            <div class="cart-buttons">
                <button type="button" class="btn btn-secondary" onclick="location.href='products_index.html'">쇼핑
                    계속하기</button>
                <button type="button" class="btn btn-danger" onclick="openClearModal()">장바구니 비우기</button>
            </div>
        </div>
    </main>

    <!-- 기존 장바구니 비우기 모달 -->
    <div id="clear-confirm-modal" class="confirm-modal" style="display: none;">
        <div class="confirm-modal-overlay" onclick="closeClearModal()"></div>
        <div class="confirm-modal-content">
            <h3>장바구니 비우기 🗑️</h3>
            <p>정말 장바구니를 완전히 비우시겠어요?</p>
            <div class="confirm-modal-buttons">
                <button type="button" class="btn-confirm-no" onclick="closeClearModal()">취소</button>
                <button type="button" class="btn-confirm-yes" onclick="executeClearCart()">비우기</button>
            </div>
        </div>
    </div>

    <!-- 주문 완료 영수증  -->
    <div id="order-receipt-modal" class="confirm-modal fancy-receipt-modal" style="display: none;">
        <div class="confirm-modal-overlay" onclick="closeOrderModal()"></div>
        <div class="confirm-modal-content fancy-receipt-content">
            <!-- 둥둥 떠다니는 아이콘 -->
            <div class="celebrate-icon"><i class="fa-solid fa-gift"></i></div>

            <h3 class="fancy-receipt-title">THANK YOU!</h3>
            <p class="fancy-receipt-subtitle">성공적으로 주문이 완료되었습니다 💚</p>

            <div class="receipt-paper">
                <div class="receipt-row">
                    <span style="color: var(--sub-color);">주문 일자</span>
                    <span id="receipt-date">2026.06.29</span>
                </div>
                <div class="receipt-row">
                    <span style="color: var(--sub-color);">주문 번호</span>
                    <span id="receipt-order-num">FL-12345678</span>
                </div>
                <div class="receipt-row total">
                    <span>최종 결제 금액</span>
                    <span id="receipt-total">0원</span>
                </div>
            </div>

            <!-- 빛이 스르륵 흐르는 영수증 최종 버튼 -->
            <button type="button" class="btn-finish-order" onclick="finishOrder()">✨ 상품 페이지로 돌아가기 ✨</button>
        </div>
    </div>

    <!-- 팀 공통 푸터가 삽입될 위치 -->
    <div id="footer"></div>

    <div class="roundG4"></div>
    <script src="../products/mouseEffect.js"></script>

    <script>
        // 에러를 방지하기 위한 더미 데이터 세팅 (초기 로드시 장바구니가 비어있을 경우)
        const sampleCart = [
            { id: 1, name: "포로그 시그니처 머그컵", price: 15000, quantity: 1, image: "https://via.placeholder.com/70x70?text=Mug" }
        ];

        // jQuery 의존성을 없애고 순수 자바스크립트로 변경하여 ReferenceError 방지
        document.addEventListener("DOMContentLoaded", function () {
            const deliverySelect = document.getElementById('sidebar-delivery-select');
            if (deliverySelect) {
                deliverySelect.addEventListener('change', function () {
                    const totalProductPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                    updateSummary(totalProductPrice);
                });
            }
            renderCartTable();

        if (!localStorage.getItem("forlog_cart")) {
            localStorage.setItem("forlog_cart", JSON.stringify(sampleCart));
        }

        function normalizeCartItem(item) {
            const price = typeof item.price === "number"
                ? item.price
                : parseInt(String(item.price || "").replace(/[^\d]/g, ""), 10);
            const quantity = parseInt(item.quantity, 10);

            return {
                ...item,
                price: Number.isNaN(price) ? 0 : price,
                quantity: Number.isNaN(quantity) || quantity < 1 ? 1 : quantity
            };
        }

        let cart = (JSON.parse(localStorage.getItem("forlog_cart")) || []).map(normalizeCartItem);
        localStorage.setItem("forlog_cart", JSON.stringify(cart));
        const tableBody = document.getElementById('cart-table-body');
        const sidebarProductPriceEl = document.getElementById('sidebar-product-price');
        const sidebarShippingFeeEl = document.getElementById('sidebar-shipping-fee');
        const sidebarDiscountPriceEl = document.getElementById('sidebar-discount-price');
        const sidebarFinalPriceEl = document.getElementById('sidebar-final-price');

        function renderCartTable() {
            if (!tableBody) return;
            if (cart.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="empty-row">장바구니에 담긴 상품이 없습니다. 💚</td></tr>`;
                updateSummary(0);
                return;
            }

            tableBody.innerHTML = cart.map(item => {
                return `
                    <tr class="cart-item-row" data-id="${item.id}">
                        <td>
                            <div class="cart-item-info-cell">
                                <div class="cart-item-img">
                                    <img src="${item.image}" alt="${item.name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/70x70?text=FORLOG'">
                                </div>
                                <span class="cart-item-name">${item.name}</span>
                                <button class="row-delete-btn" onclick="deleteItem(${item.id})">삭제</button>
                            </div>
                        </td>
                        <td><strong>${item.price.toLocaleString()}원</strong></td>
                        <td>
                            <div class="quantity-control-wrapper">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                                <span class="qty-text">${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td><span class="cart-item-subtotal">${(item.price * item.quantity).toLocaleString()}원</span></td>
                    </tr>`;
            }).join('');

            const totalProductPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            updateSummary(totalProductPrice);
        }

        function changeQty(id, amount) {
            const product = cart.find(p => p.id === id);
            if (product) {
                product.quantity += amount;
                if (product.quantity < 1) product.quantity = 1;
                localStorage.setItem("forlog_cart", JSON.stringify(cart));
                renderCartTable();
            }
        }

        function deleteItem(id) {
            cart = cart.filter(p => p.id !== id);
            localStorage.setItem("forlog_cart", JSON.stringify(cart));
            renderCartTable();
        }

        function openClearModal() {
            if (cart.length === 0) {
                alert("이미 장바구니가 비어 있습니다. 🌿");
                return;
            }
            document.getElementById("clear-confirm-modal").style.display = "flex";
        }
        function closeClearModal() { document.getElementById("clear-confirm-modal").style.display = "none"; }
        function executeClearCart() {
            cart = [];
            localStorage.setItem("forlog_cart", JSON.stringify(cart));
            renderCartTable();
            closeClearModal();
        }

        function updateSummary(totalProductPrice) {
            const deliveryType = document.getElementById('sidebar-delivery-select')?.value || 'regular';
            let shippingFee = 0;
            let shippingText = "";

            if (totalProductPrice > 0) {
                if (deliveryType === 'express') {
                    // 샛별 배송은 무조건 5,000원 부과
                    shippingFee = 5000;
                    shippingText = `+ ${shippingFee.toLocaleString()}원`;
                } else {
                    // 일반 배송은 30,000원 이상 무료
                    const isFree = totalProductPrice >= 30000;
                    shippingFee = isFree ? 0 : 3000;
                    shippingText = isFree ? "무료배송" : `+ ${shippingFee.toLocaleString()}원`;
                }
            } else {
                shippingFee = 0;
                shippingText = "0원";
            }

            const discount = totalProductPrice > 0 ? 1000 : 0;

            if(sidebarProductPriceEl) sidebarProductPriceEl.textContent = `${totalProductPrice.toLocaleString()}원`;
            if(sidebarShippingFeeEl) sidebarShippingFeeEl.textContent = shippingText;
            if(sidebarDiscountPriceEl) sidebarDiscountPriceEl.textContent = `-${discount.toLocaleString()}원`;
            if(sidebarFinalPriceEl) sidebarFinalPriceEl.textContent = `${Math.max(0, totalProductPrice + shippingFee - discount).toLocaleString()}원`;
        }

        // ✨ 폭죽을 양옆에서 터뜨려주는 함수 ✨
        function triggerFireworks() {
            var duration = 3 * 1000; // 3초 동안 폭죽
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10001 }; 
            var colors = ['#AAB664', '#DB824A', '#6F8B41', '#ffffff'];

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);

                // 왼쪽에서 팡!
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: colors
                }));
                // 오른쪽에서 팡!
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: colors
                }));
            }, 250);
        }

        // 주문 완료 로직
        function executeOrder() {
            if (cart.length === 0) {
                alert("장바구니가 비어 있습니다. 상품을 먼저 담아주세요! 🌿");
                return;
            }

            // 1. 그럴싸한 가짜 주문번호 생성
            const orderNum = "FL-" + Math.floor(Math.random() * 100000000);
            document.getElementById('receipt-order-num').textContent = orderNum;

            // 2. 오늘 날짜 연동
            const today = new Date();
            const dateStr = today.getFullYear() + "." + String(today.getMonth() + 1).padStart(2, '0') + "." + String(today.getDate()).padStart(2, '0');
            document.getElementById('receipt-date').textContent = dateStr;

            // 3. 사이드바에서 최종 결제 금액 스틸해오기
            const finalPrice = sidebarFinalPriceEl.textContent;
            document.getElementById('receipt-total').textContent = finalPrice;

            // 4. 모달 열기!
            document.getElementById("order-receipt-modal").style.display = "flex";

            // ✨ 5. 폭죽 터뜨리기! ✨
            triggerFireworks();
        }

        function closeOrderModal() {
            document.getElementById("order-receipt-modal").style.display = "none";
        }

        function finishOrder() {
            // 주문 완료 후 장바구니 싹 비우고 쇼핑 목록으로 이동
            cart = [];
            localStorage.setItem("forlog_cart", JSON.stringify(cart));
            window.location.href = 'products_index.html';
        }
    </script>

    <!-- 공통 헤더/푸터 및 관련 스크립트 비동기 호출 -->
    <script src="../common/header.js"></script>
    <script>
        // Blob 환경 및 개발 환경 공통 에러 처리를 위한 try-catch 추가
        try {
            fetch('../common/header.html')
                .then(response => {
                    if (!response.ok) throw new Error("헤더 파일을 찾을 수 없습니다.");
                    return response.text();
                })
                .then(data => {
                    document.getElementById('headers').innerHTML = data;
                    if (typeof initHeader === 'function') initHeader(); 
                })
                .catch(err => console.warn("헤더를 불러올 수 없습니다 (로컬 환경에서 실행 필요):", err));
        } catch (error) {
            console.warn("헤더 경로를 파싱할 수 없습니다 (미리보기 환경 오류).");
        }

        try {
            fetch('../common/footer.html')
                .then(response => {
                    if (!response.ok) throw new Error("푸터 파일을 찾을 수 없습니다.");
                    return response.text();
                })
                .then(data => {
                    document.getElementById('footer').innerHTML = data;
                })
                .catch(err => console.warn("푸터를 불러올 수 없습니다 (로컬 환경에서 실행 필요):", err));
        } catch (error) {
            console.warn("푸터 경로를 파싱할 수 없습니다 (미리보기 환경 오류).");
        }
    </script>

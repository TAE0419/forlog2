<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">
    <title>FOR-LOG</title>
</head>
<body>
    <div class="characterWrap">
            <img src="./img/character image/PNG/choro-gi-nomal.png" alt="Main character">
        </div>
    <img class="cloverFrame" src="./img/SVG files/cloverBackground.svg" alt="클로버 모양의 svg">
    <div class="mainWrap">
            <div class="heroVideos" aria-hidden="true">
                <video class="heroVideo videoOne" src="./img/video/video32.mp4" autoplay muted loop playsinline></video>
                <video class="heroVideo videoTwo" src="./img/video/video23.mp4" autoplay muted loop playsinline></video>
                <video class="heroVideo videoThree" src="./img/video/video31.mp4" autoplay muted loop playsinline></video>
            </div>
    <section class="sec1">
        <div class="inner">
            <div class="heroContent">
                <img class="heroLogo" src="./img/SVG files/logo/logo(white).svg" alt="FOR-LOG">
                <p>&#49885;&#47932; &#47784;&#54000;&#48652; &#51105;&#54868; &amp; &#52488;&#47196;&#44592; &#44415;&#51592; &#49660;&#54609;&#47792;</p>
            </div>
        </div>
        </div>
    </section>

    <section class="sec2">
        <div class="heroContent2">
                <div class="circle"></div><span>SHORTCUT</span>
        </div>
        <div class="boxUp">
            <img src="./img/character image/table-character2.png" alt="Brand story">
            <div></div>
            <img src="./img/character image/modernhouse-01.png" alt="Product">
        </div>
         <div class="boxDown">
            <div></div>
            <img src="./img/character image/green-01.png" alt="News">
            <div></div>
            <img src="./img/character image/welcome.png" alt="Location">
        </div>
    </section>

    <section class="sec3">
        <div class="inner">
            <div class="character">
                <img src="./img/character image/PNG/choro-gi6.png" alt="웃는 초로기">
                <div class="textWarp">
                <span>ABOUT<br>FOR-LOG</span>
                <span>포로그는 식물 마니아들을 위해<br>
                        침환경적인 디자인을하는<br>
                        캐릭터 브랜드 소품샵입니다</span>
                </div>
            </div>
        </div>
    </section>
    
    <section class="sec4">
         <img src="./img/SVG files/pattern/pattern-white.svg" alt="상단 장식 svg이미지(화이트)">
        <div class="galleryStart">
            <div class="cloverWarp"></div>
            <div class="secondWrap">
                <span>BEST<br>GALLERY</span>
                <img src="./img/character image/PNG/choro-gi5.png" alt="꽃에 물주는 choro-gi">
            </div>
        </div>
    </section>
    <script src="./js/main.js"></script>
</body>
</html>
